  /pricing/{tier}:
    get:
      summary: Get Specific Pricing Plan
      description: Get detailed information about a specific pricing tier
      tags:
        - Pricing
      operationId: getPricingPlanByTier
      security: []
      parameters:
        - name: tier
          in: path
          required: true
          schema:
            type: string
            enum: [FREE, STARTER, PRO, ENTERPRISE]
          description: Pricing tier name
          example: PRO
      responses:
        '200':
          description: Pricing plan details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PricingPlan'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /api-keys:
    get:
      summary: List API Keys
      description: Get list of all API keys for the authenticated user
      tags:
        - API Keys
      operationId: listApiKeys
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      responses:
        '200':
          description: List of API keys
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
            X-RateLimit-Tier:
              $ref: '#/components/headers/X-RateLimit-Tier'
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        required:
                          - apiKeys
                          - count
                        properties:
                          apiKeys:
                            type: array
                            items:
                              $ref: '#/components/schemas/ApiKeyInfo'
                          count:
                            type: integer
                            example: 3
        '401':
          $ref: '#/components/responses/UnauthorizedError'

    post:
      summary: Create API Key
      description: Create a new API key with the specified tier and permissions
      tags:
        - API Keys
      operationId: createApiKey
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - tier
              properties:
                name:
                  type: string
                  maxLength: 100
                  example: "Production API Key"
                  description: Friendly name for the API key
                tier:
                  $ref: '#/components/schemas/ApiKeyTier'
      responses:
        '201':
          description: API key created successfully
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
            X-RateLimit-Tier:
              $ref: '#/components/headers/X-RateLimit-Tier'
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        allOf:
                          - $ref: '#/components/schemas/ApiKeyInfo'
                          - type: object
                            required:
                              - key
                            properties:
                              key:
                                type: string
                                example: "ytu_prod_1234567890abcdef"
                                description: Full API key (shown only once)
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /api-keys/{id}:
    delete:
      summary: Delete API Key
      description: Permanently delete an API key. This action cannot be undone.
      tags:
        - API Keys
      operationId: deleteApiKey
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: API key ID
          example: "key_abc123"
      responses:
        '200':
          description: API key deleted successfully
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
            X-RateLimit-Tier:
              $ref: '#/components/headers/X-RateLimit-Tier'
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        required:
                          - deleted
                          - id
                        properties:
                          deleted:
                            type: boolean
                            example: true
                          id:
                            type: string
                            example: "key_abc123"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /metrics/usage:
    get:
      summary: Get Usage Metrics
      description: |
        Get detailed usage statistics for the authenticated API key.
        Includes request counts, success rates, and performance metrics.
      tags:
        - Metrics
      operationId: getUsageMetrics
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
            format: date
          description: Start date for metrics (YYYY-MM-DD)
          example: "2026-01-01"
        - name: endDate
          in: query
          schema:
            type: string
            format: date
          description: End date for metrics (YYYY-MM-DD)
          example: "2026-01-31"
        - name: granularity
          in: query
          schema:
            type: string
            enum: [hour, day, week, month]
            default: day
          description: Data aggregation granularity
      responses:
        '200':
          description: Usage metrics retrieved successfully
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
            X-RateLimit-Tier:
              $ref: '#/components/headers/X-RateLimit-Tier'
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        required:
                          - apiKeyId
                          - period
                          - totalRequests
                          - successfulRequests
                          - failedRequests
                          - averageResponseTime
                        properties:
                          apiKeyId:
                            type: string
                            example: "key_abc123"
                          period:
                            type: object
                            properties:
                              start:
                                type: string
                                format: date
                              end:
                                type: string
                                format: date
                          totalRequests:
                            type: integer
                            example: 5420
                          successfulRequests:
                            type: integer
                            example: 5385
                          failedRequests:
                            type: integer
                            example: 35
                          successRate:
                            type: number
                            example: 99.35
                            description: Success rate percentage
                          averageResponseTime:
                            type: number
                            example: 245.5
                            description: Average response time in milliseconds
                          endpoints:
                            type: object
                            additionalProperties:
                              type: object
                              properties:
                                requests:
                                  type: integer
                                averageResponseTime:
                                  type: number
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /monitoring/performance:
    get:
      summary: Get Performance Statistics
      description: Get real-time performance statistics for API endpoints
      tags:
        - Monitoring
      operationId: getPerformanceStats
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: endpoint
          in: query
          schema:
            type: string
          description: Specific endpoint to get stats for (optional)
          example: "/translate"
        - name: timeWindow
          in: query
          schema:
            type: integer
            default: 3600000
          description: Time window in milliseconds (default 1 hour)
          example: 3600000
      responses:
        '200':
          description: Performance statistics retrieved successfully
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
            X-RateLimit-Tier:
              $ref: '#/components/headers/X-RateLimit-Tier'
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          timeWindow:
                            type: integer
                            example: 3600000
                          timestamp:
                            type: string
                            format: date-time
                          stats:
                            type: object
                            additionalProperties:
                              type: object
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /monitoring/alerts:
    get:
      summary: Get Monitoring Alerts
      description: Get recent monitoring alerts and notifications
      tags:
        - Monitoring
      operationId: getMonitoringAlerts
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            maximum: 500
          description: Maximum number of alerts to return
        - name: severity
          in: query
          schema:
            type: string
            enum: [low, medium, high, critical]
          description: Filter by severity level
        - name: type
          in: query
          schema:
            type: string
            enum: [HIGH_ERROR_RATE, SLOW_RESPONSE_TIME, RATE_LIMIT_ABUSE, HIGH_ERROR_COUNT]
          description: Filter by alert type
      responses:
        '200':
          description: Alerts retrieved successfully
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
            X-RateLimit-Tier:
              $ref: '#/components/headers/X-RateLimit-Tier'
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          count:
                            type: integer
                          alerts:
                            type: array
                            items:
                              type: object
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /docs:
    get:
      summary: Interactive API Documentation
      description: View interactive Swagger UI documentation
      tags:
        - Documentation
      operationId: viewDocs
      security: []
      responses:
        '200':
          description: Swagger UI HTML page
          content:
            text/html:
              schema:
                type: string

  /openapi.json:
    get:
      summary: OpenAPI Specification (JSON)
      description: Download OpenAPI specification in JSON format
      tags:
        - Documentation
      operationId: getOpenApiJson
      security: []
      responses:
        '200':
          description: OpenAPI JSON specification
          content:
            application/json:
              schema:
                type: object

  /openapi.yaml:
    get:
      summary: OpenAPI Specification (YAML)
      description: Download OpenAPI specification in YAML format
      tags:
        - Documentation
      operationId: getOpenApiYaml
      security: []
      responses:
        '200':
          description: OpenAPI YAML specification
          content:
            text/yaml:
              schema:
                type: string

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: |
        API Key authentication. Include your API key in the `X-API-Key` header.
        
        Example: `X-API-Key: ytu_prod_1234567890abcdef`
        
        Get your API key from the [API Keys Dashboard](https://dashboard.ytu-api.com/keys).

    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API Key
      description: |
        Bearer token authentication using your API key.
        
        Example: `Authorization: Bearer ytu_prod_1234567890abcdef`

  headers:
    X-RateLimit-Limit:
      description: Maximum number of requests allowed in the current time window
      schema:
        type: integer
        example: 1000

    X-RateLimit-Remaining:
      description: Number of requests remaining in the current time window
      schema:
        type: integer
        example: 847

    X-RateLimit-Reset:
      description: Unix timestamp when the rate limit resets
      schema:
        type: integer
        example: 1738329600

    X-RateLimit-Tier:
      description: Current pricing tier
      schema:
        type: string
        enum: [FREE, STARTER, PRO, ENTERPRISE]
        example: PRO

  schemas:
    SuccessResponse:
      type: object
      required:
        - success
        - data
        - metadata
      properties:
        success:
          type: boolean
          example: true
          description: Indicates successful request
        data:
          type: object
          description: Response data (varies by endpoint)
        metadata:
          $ref: '#/components/schemas/ResponseMetadata'

    ErrorResponse:
      type: object
      required:
        - success
        - error
        - metadata
      properties:
        success:
          type: boolean
          example: false
          description: Indicates failed request
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              example: VALIDATION_ERROR
              description: Error code for programmatic handling
            message:
              type: string
              example: Validation failed
              description: Human-readable error message
            details:
              type: object
              description: Additional error context and details
              additionalProperties: true
        metadata:
          $ref: '#/components/schemas/ResponseMetadata'

    ResponseMetadata:
      type: object
      required:
        - requestId
        - timestamp
        - processingTime
      properties:
        requestId:
          type: string
          example: req_1738329600_a1b2c3d4
          description: Unique request identifier for tracking and support
        timestamp:
          type: string
          format: date-time
          example: '2026-01-31T10:30:45.123Z'
          description: ISO 8601 timestamp of the response
        processingTime:
          type: integer
          example: 245
          description: Request processing time in milliseconds

    TranslationRequest:
      type: object
      required:
        - text
        - targetLanguage
      properties:
        text:
          type: string
          minLength: 1
          maxLength: 5000
          example: "Hello, how can I help you today?"
          description: Text to translate (1-5000 characters)
        targetLanguage:
          type: string
          pattern: '^[a-z]{2}$'
          example: "es"
          description: Target language code (ISO 639-1, 2 lowercase letters)
        sourceLanguage:
          type: string
          pattern: '^[a-z]{2}$'
          example: "en"
          description: Source language code (ISO 639-1). Auto-detected if not provided

    TranslationResponse:
      type: object
      required:
        - originalText
        - translatedText
        - sourceLanguage
        - targetLanguage
        - confidence
      properties:
        originalText:
          type: string
          example: "Hello, how can I help you today?"
        translatedText:
          type: string
          example: "Hola, ¿cómo puedo ayudarte hoy?"
        sourceLanguage:
          type: string
          example: "en"
          description: Detected or provided source language code
        targetLanguage:
          type: string
          example: "es"
          description: Target language code
        confidence:
          type: number
          format: float
          minimum: 0
          maximum: 1
          example: 0.98
          description: Translation confidence score (0.0 - 1.0)

    ToneAnalysisRequest:
      type: object
      required:
        - text
      properties:
        text:
          type: string
          minLength: 1
          maxLength: 5000
          example: "I am extremely disappointed with the service quality."
          description: Text to analyze (1-5000 characters)
        language:
          type: string
          pattern: '^[a-z]{2}$'
          example: "en"
          description: Language code (ISO 639-1). Auto-detected if not provided
        context:
          type: string
          maxLength: 1000
          example: "Customer service response"
          description: Business context for improved analysis accuracy

    ToneAnalysisResponse:
      type: object
      required:
        - toneScore
        - formality
        - emotion
        - emotionIntensity
        - urgency
        - intent
        - culturalContext
        - detailedAnalysis
        - suggestions
        - timestamp
      properties:
        toneScore:
          type: integer
          minimum: 0
          maximum: 100
          example: 85
          description: Overall human-likeness score (0-100, higher is more human-like)
        formality:
          type: integer
          minimum: 1
          maximum: 10
          example: 7
          description: Formality level (1=very casual, 10=very formal)
        emotion:
          type: string
          enum: [positive, neutral, negative, mixed]
          example: "negative"
          description: Primary emotion detected
        emotionIntensity:
          type: string
          enum: [low, medium, high]
          example: "high"
          description: Intensity of the detected emotion
        urgency:
          type: string
          enum: [low, medium, high]
          example: "high"
          description: Urgency level of the message
        intent:
          type: string
          enum: [question, complaint, request, feedback, greeting, farewell, other]
          example: "complaint"
          description: Primary intent of the message
        culturalContext:
          type: string
          example: "western_direct"
          description: Detected cultural communication style
        detailedAnalysis:
          type: object
          required:
            - naturalness
            - contextRelevance
            - emotionalAppropriateness
            - culturalAppropriateness
          properties:
            naturalness:
              type: integer
              minimum: 0
              maximum: 100
              example: 90
              description: Natural language pattern score
            contextRelevance:
              type: integer
              minimum: 0
              maximum: 100
              example: 85
              description: Context relevance score
            emotionalAppropriateness:
              type: integer
              minimum: 0
              maximum: 100
              example: 80
              description: Emotional appropriateness score
            culturalAppropriateness:
              type: integer
              minimum: 0
              maximum: 100
              example: 85
              description: Cultural appropriateness score
        suggestions:
          type: array
          items:
            type: string
          example:
            - "Respond with empathy and acknowledgment"
            - "Address the concern directly"
            - "Use apologetic language"
          description: AI-generated suggestions for responding
        timestamp:
          type: string
          format: date-time
          example: '2026-01-31T10:31:00.123Z'

    GenerateResponseRequest:
      type: object
      required:
        - originalText
      properties:
        originalText:
          type: string
          minLength: 1
          maxLength: 5000
          example: "I need to return this product, it arrived damaged."
          description: Original message to respond to
        toneAnalysis:
          $ref: '#/components/schemas/ToneAnalysisResponse'
          description: Pre-computed tone analysis (optional, will analyze if not provided)
        context:
          type: string
          maxLength: 1000
          example: "E-commerce customer service"
          description: Business context for response generation
        language:
          type: string
          pattern: '^[a-z]{2}$'
          example: "en"
          description: Target language for the response (ISO 639-1)
        tone:
          type: string
          enum: [professional, casual, friendly, formal, empathetic, concise]
          default: professional
          example: "empathetic"
          description: Desired response style/tone
        numAlternatives:
          type: integer
          minimum: 0
          maximum: 5
          default: 2
          example: 3
          description: Number of alternative responses to generate (0-5)

    GenerateResponseResponse:
      type: object
      required:
        - response
        - score
        - alternatives
        - language
        - responseStyle
        - metadata
        - timestamp
      properties:
        response:
          type: string
          example: "I sincerely apologize for the inconvenience. We will process your return immediately and send a replacement right away."
          description: Best generated response based on scoring
        score:
          type: integer
          minimum: 0
          maximum: 100
          example: 94
          description: Quality score of the response (0-100)
        alternatives:
          type: array
          items:
            type: object
            required:
              - text
              - score
            properties:
              text:
                type: string
              score:
                type: integer
                minimum: 0
                maximum: 100
          example:
            - text: "We apologize for the damaged product. Your return is being processed."
              score: 85
            - text: "I'm sorry to hear that. Let me arrange a replacement for you immediately."
              score: 88
          description: Alternative response options ranked by score
        language:
          type: string
          example: "en"
          description: Language of the generated response
        responseStyle:
          type: string
          example: "empathetic"
          description: Style used for response generation
        metadata:
          type: object
          required:
            - totalCandidates
            - generationTime
            - model
          properties:
            totalCandidates:
              type: integer
              example: 5
              description: Total number of candidates generated
            generationTime:
              type: integer
              example: 1200
              description: Generation time in milliseconds
            model:
              type: string
              example: "gpt-4"
              description: AI model used for generation
        timestamp:
          type: string
          format: date-time
          example: '2026-01-31T10:32:00.123Z'

    ProcessRequest:
      type: object
      required:
        - text
        - targetLanguage
      properties:
        text:
          type: string
          minLength: 1
          maxLength: 5000
          example: "I want to cancel my subscription immediately."
          description: Original message text to process
        sourceLanguage:
          type: string
          pattern: '^[a-z]{2}$'
          example: "en"
          description: Source language code (auto-detected if not provided)
        targetLanguage:
          type: string
          pattern: '^[a-z]{2}$'
          example: "es"
          description: Target language for response (ISO 639-1)
        context:
          type: string
          maxLength: 1000
          example: "SaaS customer service"
          description: Business context for processing
        options:
          type: object
          properties:
            translate:
              type: boolean
              default: true
              description: Enable translation step
            analyzeTone:
              type: boolean
              default: true
              description: Enable tone analysis step
            generateResponse:
              type: boolean
              default: false
              description: Enable response generation step

    ProcessResponse:
      type: object
      required:
        - originalText
        - timestamp
      properties:
        originalText:
          type: string
          example: "I want to cancel my subscription immediately."
        translation:
          $ref: '#/components/schemas/TranslationResponse'
          description: Translation result (if translation enabled)
        toneAnalysis:
          $ref: '#/components/schemas/ToneAnalysisResponse'
          description: Tone analysis result (if tone analysis enabled)
        generatedResponse:
          $ref: '#/components/schemas/GenerateResponseResponse'
          description: Generated response (if response generation enabled)
        timestamp:
          type: string
          format: date-time
          example: '2026-01-31T10:33:00.123Z'

    ApiKeyTier:
      type: string
      enum: [FREE, STARTER, PRO, ENTERPRISE]
      example: PRO
      description: API key pricing tier

    ApiKeyInfo:
      type: object
      required:
        - id
        - name
        - tier
        - createdAt
        - isActive
        - keyPreview
      properties:
        id:
          type: string
          example: "key_abc123xyz"
          description: Unique API key identifier
        name:
          type: string
          example: "Production API Key"
          description: Friendly name for the API key
        tier:
          $ref: '#/components/schemas/ApiKeyTier'
        createdAt:
          type: string
          format: date-time
          example: '2026-01-15T08:00:00.123Z'
          description: Key creation timestamp
        lastUsedAt:
          type: string
          format: date-time
          example: '2026-01-31T10:30:00.123Z'
          description: Last usage timestamp
        isActive:
          type: boolean
          example: true
          description: Whether the key is currently active
        keyPreview:
          type: string
          example: "ytu_prod...xyz"
          description: Masked preview of the API key

    PricingPlan:
      type: object
      required:
        - tier
        - name
        - description
        - price
        - limits
        - features
      properties:
        tier:
          $ref: '#/components/schemas/ApiKeyTier'
        name:
          type: string
          example: "Pro Plan"
        description:
          type: string
          example: "For growing businesses with high volume"
        price:
          type: string
          example: "$99/month"
        limits:
          type: object
          properties:
            requestsPerDay:
              oneOf:
                - type: integer
                - type: string
              example: 10000
            requestsPerMinute:
              oneOf:
                - type: integer
                - type: string
              example: 100
        features:
          type: array
          items:
            type: string
          example:
            - "All STARTER features"
            - "Advanced analytics"
            - "Priority support"

  responses:
    UnauthorizedError:
      description: Authentication required or invalid API key
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            missing-api-key:
              summary: Missing API Key
              value:
                success: false
                error:
                  code: UNAUTHORIZED
                  message: "Authentication required: Missing or invalid API Key"
                  details:
                    hint: "Include your API key in the X-API-Key header or as a Bearer token"
                metadata:
                  requestId: req_unauth_123
                  timestamp: '2026-01-31T10:30:45.123Z'
                  processingTime: 3
            invalid-api-key:
              summary: Invalid API Key
              value:
                success: false
                error:
                  code: INVALID_API_KEY
                  message: "The provided API key is invalid or has been revoked"
                  details:
                    hint: "Check your API key in the dashboard at https://dashboard.ytu-api.com/keys"
                metadata:
                  requestId: req_unauth_456
                  timestamp: '2026-01-31T10:30:45.123Z'
                  processingTime: 5

    RateLimitError:
      description: Rate limit exceeded
      headers:
        X-RateLimit-Limit:
          $ref: '#/components/headers/X-RateLimit-Limit'
        X-RateLimit-Remaining:
          $ref: '#/components/headers/X-RateLimit-Remaining'
        X-RateLimit-Reset:
          $ref: '#/components/headers/X-RateLimit-Reset'
        X-RateLimit-Tier:
          $ref: '#/components/headers/X-RateLimit-Tier'
        Retry-After:
          description: Seconds to wait before retrying
          schema:
