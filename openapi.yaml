openapi: 3.0.3
info:
  title: Y TU - AI Translation & Human Tone Authentication API
  version: 1.0.0
  description: |
    # Y TU API Documentation
    
    **Y TU API** is a comprehensive AI-powered solution for businesses using AI agents and automated customer communication systems. It provides seamless translation, human tone analysis, and intelligent response generation to eliminate language barriers and enhance customer engagement.
    
    ## 🌟 Key Features
    
    - **Multi-language Translation**: Support for 100+ languages with automatic language detection
    - **Human Tone Analysis**: AI-powered evaluation of formality, emotion, urgency, intent, and cultural context
    - **Response Generation**: Create natural, human-like responses optimized for customer engagement
    - **All-in-One Processing**: Complete pipeline from translation to response generation in a single API call
    - **Cultural Sensitivity**: Responses adapted to different cultural communication styles
    
    ## 🔐 Authentication
    
    All endpoints (except public endpoints) require API key authentication. Include your API key using one of these methods:
    
    - **Header**: `X-API-Key: your-api-key-here`
    - **Bearer Token**: `Authorization: Bearer your-api-key-here`
    
    Get your API key from the [API Keys Dashboard](https://dashboard.ytu-api.com/keys).
    
    ## 📊 Rate Limiting
    
    Rate limits vary by pricing tier. All authenticated responses include rate limit headers:
    
    - `X-RateLimit-Limit`: Maximum requests allowed in the current window
    - `X-RateLimit-Remaining`: Remaining requests in the current window
    - `X-RateLimit-Reset`: Unix timestamp when the rate limit resets
    - `X-RateLimit-Tier`: Your current pricing tier
    
    ### Rate Limits by Tier:
    
    | Tier | Requests/Day | Requests/Minute | Price |
    |------|--------------|-----------------|-------|
    | **FREE** | 100 | 10 | $0/month |
    | **STARTER** | 1,000 | 50 | $29/month |
    | **PRO** | 10,000 | 100 | $99/month |
    | **ENTERPRISE** | Unlimited | Unlimited | Custom |
    
    ## 🎯 Use Cases
    
    - **Customer Service**: Provide multilingual support with emotionally intelligent responses
    - **E-commerce**: Handle international customer inquiries with cultural sensitivity
    - **SaaS Support**: Automate helpdesk responses across multiple languages
    - **Content Localization**: Translate and adapt content for different markets
    
    ## 📞 Support
    
    - **Email**: support@ytu-api.com
    - **Documentation**: https://docs.ytu-api.com
    - **Status Page**: https://status.ytu-api.com
    
  contact:
    name: Y TU API Support
    email: support@ytu-api.com
    url: https://ytu-api.com/support
  license:
    name: Proprietary
    url: https://ytu-api.com/license
  termsOfService: https://ytu-api.com/terms

servers:
  - url: https://api.ytu-translate.com/api/v1
    description: Production Server
  - url: https://staging-api.ytu-translate.com/api/v1
    description: Staging Server
  - url: http://localhost:3000/api/v1
    description: Development Server

tags:
  - name: Health
    description: API health and status monitoring
  - name: Translation
    description: Multi-language translation with auto-detection
  - name: Tone Analysis
    description: AI-powered tone and sentiment analysis
  - name: Response Generation
    description: Generate human-like, contextually appropriate responses
  - name: Processing
    description: All-in-one processing pipeline (recommended)
  - name: Languages
    description: Supported languages and language detection
  - name: API Keys
    description: API key management and authentication
  - name: Metrics
    description: Usage metrics and analytics
  - name: Monitoring
    description: Performance monitoring and alerts
  - name: Pricing
    description: Pricing plans and feature comparison
  - name: Documentation
    description: API documentation and specifications

paths:
  /health:
    get:
      summary: Health Check
      description: |
        Check API health status, uptime, and environment information.
        This endpoint does not require authentication.
      tags:
        - Health
      operationId: healthCheck
      security: []
      responses:
        '200':
          description: API is healthy and operational
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        required:
                          - status
                          - timestamp
                          - environment
                          - apiVersion
                          - uptime
                          - service
                        properties:
                          status:
                            type: string
                            example: ok
                            description: Service health status
                          timestamp:
                            type: string
                            format: date-time
                            example: '2026-01-31T10:30:45.123Z'
                          environment:
                            type: string
                            example: production
                            enum: [production, staging, development]
                          apiVersion:
                            type: string
                            example: v1
                          uptime:
                            type: number
                            example: 3600.5
                            description: Server uptime in seconds
                          service:
                            type: string
                            example: ytu-api
              examples:
                healthy:
                  summary: Healthy API
                  value:
                    success: true
                    data:
                      status: ok
                      timestamp: '2026-01-31T10:30:45.123Z'
                      environment: production
                      apiVersion: v1
                      uptime: 86400.5
                      service: ytu-api
                    metadata:
                      requestId: req_health_abc123
                      timestamp: '2026-01-31T10:30:45.123Z'
                      processingTime: 2
        '503':
          description: Service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /translate:
    post:
      summary: Translate Text
      description: |
        Translate text from one language to another with automatic language detection.
        
        **Features:**
        - Automatic source language detection if not provided
        - High-quality neural machine translation
        - Confidence scoring for translation quality
        - Support for 100+ languages
        
        **Rate Limits:**
        - FREE: 100 requests/day, 10 requests/minute
        - STARTER: 1,000 requests/day, 50 requests/minute
        - PRO: 10,000 requests/day, 100 requests/minute
        - ENTERPRISE: Unlimited
      tags:
        - Translation
      operationId: translateText
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TranslationRequest'
            examples:
              english-to-spanish:
                summary: Customer Service (EN → ES)
                value:
                  text: "Hello, how can I help you today?"
                  sourceLanguage: "en"
                  targetLanguage: "es"
              auto-detect:
                summary: Auto-detect Language
                value:
                  text: "Bonjour, comment puis-je vous aider?"
                  targetLanguage: "en"
              ecommerce:
                summary: E-commerce Inquiry
                value:
                  text: "When will my order arrive?"
                  sourceLanguage: "en"
                  targetLanguage: "de"
      responses:
        '200':
          description: Translation successful
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
            X-RateLimit-Tier:
              $ref: '#/components/headers/X-RateLimit-Tier'
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TranslationResponse'
              examples:
                translation-result:
                  summary: Successful Translation
                  value:
                    success: true
                    data:
                      originalText: "Hello, how can I help you today?"
                      translatedText: "Hola, ¿cómo puedo ayudarte hoy?"
                      sourceLanguage: "en"
                      targetLanguage: "es"
                      confidence: 0.98
                    metadata:
                      requestId: req_trans_abc123
                      timestamp: '2026-01-31T10:30:45.123Z'
                      processingTime: 245
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '429':
          $ref: '#/components/responses/RateLimitError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /analyze-tone:
    post:
      summary: Analyze Human Tone
      description: |
        Perform AI-powered analysis of text for human-like tone, formality, emotion, urgency, intent, and cultural context.
        
        **Analysis Dimensions:**
        - **Tone Score**: Overall human-likeness (0-100)
        - **Formality**: Scale from 1 (casual) to 10 (formal)
        - **Emotion**: positive, neutral, negative, or mixed
        - **Urgency**: low, medium, or high
        - **Intent**: question, complaint, request, feedback, greeting, farewell, or other
        - **Cultural Context**: Detected communication style (e.g., western_direct, asian_indirect)
        
        **Use Cases:**
        - Analyze customer sentiment in support tickets
        - Detect urgency for prioritization
        - Understand customer intent for routing
        - Evaluate cultural communication patterns
      tags:
        - Tone Analysis
      operationId: analyzeTone
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ToneAnalysisRequest'
            examples:
              frustrated-customer:
                summary: Frustrated Customer
                value:
                  text: "I'm extremely frustrated with this service! This is the third time I've had to contact support."
                  language: "en"
                  context: "Customer service escalation"
              polite-inquiry:
                summary: Polite Inquiry
                value:
                  text: "Good morning, I was wondering if you could provide information about your return policy."
                  language: "en"
                  context: "E-commerce inquiry"
              urgent-request:
                summary: Urgent Request
                value:
                  text: "My account was charged twice! Please fix this immediately!"
                  language: "en"
                  context: "Billing issue"
      responses:
        '200':
          description: Tone analysis successful
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
            X-RateLimit-Tier:
              $ref: '#/components/headers/X-RateLimit-Tier'
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ToneAnalysisResponse'
              examples:
                frustrated-tone:
                  summary: Frustrated Customer Analysis
                  value:
                    success: true
                    data:
                      toneScore: 72
                      formality: 4
                      emotion: "negative"
                      emotionIntensity: "high"
                      urgency: "high"
                      intent: "complaint"
                      culturalContext: "western_direct"
                      detailedAnalysis:
                        naturalness: 85
                        contextRelevance: 90
                        emotionalAppropriateness: 95
                        culturalAppropriateness: 88
                      suggestions:
                        - "Respond with empathy and acknowledgment of frustration"
                        - "Offer immediate solution or escalation"
                        - "Use apologetic and reassuring language"
                        - "Provide specific timeline for resolution"
                      timestamp: '2026-01-31T10:31:00.123Z'
                    metadata:
                      requestId: req_tone_def456
                      timestamp: '2026-01-31T10:31:00.123Z'
                      processingTime: 420
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '429':
          $ref: '#/components/responses/RateLimitError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /generate-response:
    post:
      summary: Generate AI Response
      description: |
        Generate contextually appropriate, human-like responses using advanced AI.
        
        **Generation Process:**
        1. Analyze original message context and intent
        2. Generate multiple response candidates (3-5)
        3. Score each candidate on human-likeness, appropriateness, clarity, and cultural sensitivity
        4. Return the best response with alternatives
        
        **Response Styles:**
        - **professional**: Business-appropriate, polished language
        - **casual**: Relaxed, conversational tone
        - **friendly**: Warm, approachable, and personable
        - **formal**: Very formal and respectful
        - **empathetic**: Understanding, compassionate, and supportive
        - **concise**: Brief and to the point
        
        **Quality Scoring:**
        - Human-likeness: Natural language patterns
        - Appropriateness: Context and intent matching
        - Clarity: Readability and comprehension
        - Cultural sensitivity: Cultural appropriateness
      tags:
        - Response Generation
      operationId: generateResponse
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateResponseRequest'
            examples:
              empathetic-response:
                summary: Empathetic Customer Service
                value:
                  originalText: "I'm extremely frustrated with this service! This is the third time I've had to contact support."
                  context: "Customer service escalation"
                  language: "en"
                  tone: "empathetic"
                  numAlternatives: 3
              damaged-product:
                summary: Product Return Response
                value:
                  originalText: "I need to return this product, it arrived damaged."
                  context: "E-commerce customer service"
                  language: "en"
                  tone: "professional"
                  numAlternatives: 2
      responses:
        '200':
          description: Response generated successfully
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
            X-RateLimit-Tier:
              $ref: '#/components/headers/X-RateLimit-Tier'
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/GenerateResponseResponse'
              examples:
                generated-response:
                  summary: Empathetic Response Generated
                  value:
                    success: true
                    data:
                      response: "I completely understand your frustration, and I sincerely apologize for the inconvenience you've experienced. Having to contact support multiple times is unacceptable, and I want to make this right for you immediately. Let me personally ensure this issue is resolved today. Could you please provide me with your account details so I can prioritize this?"
                      score: 94
                      alternatives:
                        - text: "I'm truly sorry to hear about your experience. This shouldn't have happened, and I take full responsibility for getting this resolved for you right away. What can I help you with specifically?"
                          score: 89
                        - text: "Thank you for your patience. I can see you've contacted us before about this issue. Let me escalate this to our senior team immediately to ensure we resolve this for you today."
                          score: 85
                      language: "en"
                      responseStyle: "empathetic"
                      metadata:
                        totalCandidates: 5
                        generationTime: 1200
                        model: "gpt-4"
                      timestamp: '2026-01-31T10:32:00.123Z'
                    metadata:
                      requestId: req_gen_ghi789
                      timestamp: '2026-01-31T10:32:00.123Z'
                      processingTime: 1250
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '429':
          $ref: '#/components/responses/RateLimitError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /process:
    post:
      summary: Complete Processing Pipeline (Recommended)
      description: |
        Execute the complete Y TU AI pipeline in a single API call. This is the **recommended endpoint** for most use cases.
        
        **Processing Steps:**
        1. **Language Detection**: Automatically detect source language
        2. **Translation**: Translate to target language (if different from source)
        3. **Tone Analysis**: Analyze human tone, emotion, urgency, and intent
        4. **Response Generation**: Generate optimal human-like response
        
        **Processing Options:**
        - `translate`: Enable translation (default: true if targetLanguage provided)
        - `analyzeTone`: Enable tone analysis (default: true)
        - `generateResponse`: Enable response generation (default: false, set to true if you want a response)
        
        **Benefits:**
        - Single API call for complete workflow
        - Reduced latency compared to multiple calls
        - Automatic context passing between steps
        - Optimized pricing for bundled operations
      tags:
        - Processing
      operationId: processMessage
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProcessRequest'
            examples:
              full-pipeline:
                summary: Complete Pipeline (Spanish → English)
                value:
                  text: "Estoy muy frustrado con este servicio! Esta es la tercera vez que tengo que contactar soporte."
                  sourceLanguage: "es"
                  targetLanguage: "en"
                  context: "SaaS customer service"
                  options:
                    translate: true
                    analyzeTone: true
                    generateResponse: true
              auto-detect:
                summary: Auto-detect with Response
                value:
                  text: "Je suis très satisfait de votre produit!"
                  targetLanguage: "en"
                  context: "E-commerce feedback"
                  options:
                    translate: true
                    analyzeTone: true
                    generateResponse: true
              tone-only:
                summary: Tone Analysis Only (No Translation)
                value:
                  text: "I love this product! It's amazing!"
                  targetLanguage: "en"
                  context: "Product review"
                  options:
                    translate: false
                    analyzeTone: true
                    generateResponse: false
      responses:
        '200':
          description: Processing completed successfully
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
            X-RateLimit-Tier:
              $ref: '#/components/headers/X-RateLimit-Tier'
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ProcessResponse'
              examples:
                complete-processing:
                  summary: Complete Pipeline Result
                  value:
                    success: true
                    data:
                      originalText: "Estoy muy frustrado con este servicio!"
                      translation:
                        originalText: "Estoy muy frustrado con este servicio!"
                        translatedText: "I'm very frustrated with this service!"
                        sourceLanguage: "es"
                        targetLanguage: "en"
                        confidence: 0.97
                      toneAnalysis:
                        toneScore: 68
                        formality: 3
                        emotion: "negative"
                        emotionIntensity: "high"
                        urgency: "high"
                        intent: "complaint"
                        culturalContext: "western_direct"
                        detailedAnalysis:
                          naturalness: 82
                          contextRelevance: 88
                          emotionalAppropriateness: 92
                          culturalAppropriateness: 85
                        suggestions:
                          - "Acknowledge frustration immediately"
                          - "Provide concrete solution"
                          - "Use empathetic language"
                        timestamp: '2026-01-31T10:33:00.123Z'
                      generatedResponse:
                        response: "I completely understand your frustration, and I sincerely apologize for this experience. Let me personally ensure we resolve this for you right away. What specific issue are you experiencing?"
                        score: 92
                        alternatives:
                          - text: "I'm truly sorry to hear about your frustration. This isn't the experience we want for you. How can I help make this right immediately?"
                            score: 88
                        language: "en"
                        responseStyle: "empathetic"
                        metadata:
                          totalCandidates: 5
                          generationTime: 980
                          model: "gpt-4"
                        timestamp: '2026-01-31T10:33:00.123Z'
                      timestamp: '2026-01-31T10:33:00.123Z'
                    metadata:
                      requestId: req_proc_jkl012
                      timestamp: '2026-01-31T10:33:00.123Z'
                      processingTime: 1850
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '429':
          $ref: '#/components/responses/RateLimitError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /languages:
    get:
      summary: Get Supported Languages
      description: |
        Get a complete list of all languages supported for translation.
        This endpoint does not require authentication.
      tags:
        - Languages
      operationId: getSupportedLanguages
      security: []
      responses:
        '200':
          description: List of supported languages
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        required:
                          - languages
                          - count
                        properties:
                          languages:
                            type: array
                            items:
                              type: object
                              required:
                                - code
                                - name
                              properties:
                                code:
                                  type: string
                                  example: "en"
                                  description: ISO 639-1 language code
                                name:
                                  type: string
                                  example: "English"
                                  description: Language name
                                nativeName:
                                  type: string
                                  example: "English"
                                  description: Language name in native script
                          count:
                            type: number
                            example: 108
                            description: Total number of supported languages
              examples:
                supported-languages:
                  summary: Supported Languages Response
                  value:
                    success: true
                    data:
                      languages:
                        - code: "en"
                          name: "English"
                          nativeName: "English"
                        - code: "es"
                          name: "Spanish"
                          nativeName: "Español"
                        - code: "fr"
                          name: "French"
                          nativeName: "Français"
                        - code: "de"
                          name: "German"
                          nativeName: "Deutsch"
                        - code: "zh"
                          name: "Chinese"
                          nativeName: "中文"
                        - code: "ja"
                          name: "Japanese"
                          nativeName: "日本語"
                      count: 108
                    metadata:
                      requestId: req_lang_mno345
                      timestamp: '2026-01-31T10:34:00.123Z'
                      processingTime: 15

