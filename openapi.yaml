        - Webhook notifications
    price: $99/month
    
  ENTERPRISE:
    description: Custom solutions for large organizations
    limits:
      requestsPerDay: unlimited
      requestsPerMinute: unlimited
      features:
        - All PRO features
        - Custom integrations
        - Dedicated account manager
